<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>🔔 Alarma Vecinal</title>
  
  <!-- Bootstrap 5 + Iconos -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
    }
    .card-alarma {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 48px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
      color: #f0f9ff;
      transition: all 0.2s ease;
    }
    .btn-alarma {
      border-radius: 60px;
      padding: 18px 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: 0.15s;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.2);
      border: none;
    }
    .btn-alarma:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
    }
    .btn-activar {
      background: #f03a47;
      color: white;
    }
    .btn-activar:hover {
      background: #d62c39;
      color: white;
    }
    .btn-desactivar {
      background: #2b8c5e;
      color: white;
    }
    .btn-desactivar:hover {
      background: #1f6f4a;
      color: white;
    }
    .btn-activar:disabled,
    .btn-desactivar:disabled {
      opacity: 0.4;
      transform: translateY(2px);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
      pointer-events: none;
    }
    .badge-conexion {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .estado-alarma {
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 60px;
      padding: 10px 22px;
      display: inline-block;
      transition: 0.3s;
    }
    .estado-alarma.activa {
      background: rgba(240, 58, 71, 0.2);
      border: 1px solid rgba(240, 58, 71, 0.3);
    }
    .icono-pulso {
      animation: pulse-icon 1.5s infinite;
    }
    @keyframes pulse-icon {
      0% { opacity: 0.5; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.15); }
      100% { opacity: 0.5; transform: scale(0.95); }
    }
    .list-group-item {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.03);
      color: #d4e6ff;
      border-radius: 30px !important;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .badge-dispositivo {
      background: #2e4b6b;
      color: #b8d4ff;
    }
    .badge-alarma {
      background: #f03a47;
      color: white;
      animation: pulse-icon 0.7s infinite;
    }
    .footer-info {
      font-size: 0.8rem;
      opacity: 0.6;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 16px;
    }
    #logList {
      max-height: 160px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    #logList::-webkit-scrollbar {
      width: 4px;
    }
    #logList::-webkit-scrollbar-track {
      background: #1a2f44;
      border-radius: 10px;
    }
    #logList::-webkit-scrollbar-thumb {
      background: #4b7a9c;
      border-radius: 10px;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .toast {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
    }
    .toast-header {
      background: transparent;
      color: white;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .btn-limpiar {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #a0c4e8;
      border-radius: 40px;
      padding: 4px 16px;
      font-size: 0.8rem;
    }
    .btn-limpiar:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }
    .device-id {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 12px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>

  <!-- Toast de notificación -->
  <div class="toast-container">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <i class="bi bi-bell-fill text-danger me-2"></i>
        <strong class="me-auto">🔔 Alarma Vecinal</strong>
        <small id="toastTime">ahora</small>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
      </div>
      <div class="toast-body" id="toastBody">
        ¡Alarma activada por un vecino!
      </div>
    </div>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10 col-12">

        <div class="card card-alarma p-4 p-md-5">

          <!-- HEADER -->
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h2 class="h3 mb-0 fw-bold d-flex align-items-center gap-2">
              <i class="bi bi-broadcast text-danger icono-pulso"></i>
              Alarma Vecinal
            </h2>
            <span class="badge-conexion text-light" id="connectionBadge">
              <i class="bi bi-circle-fill text-success me-1" id="statusLed"></i>
              <span id="statusText">Conectando...</span>
            </span>
          </div>

          <p class="text-light-emphasis opacity-75 small mb-3">
            <i class="bi bi-people-fill me-1"></i>
            <span id="deviceCounter">0</span> vecinos conectados
            <span class="mx-2">·</span>
            <span class="device-id" id="myDeviceId">---</span>
          </p>

          <!-- ESTADO DE ALARMA -->
          <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
            <div class="estado-alarma" id="alarmaStatusDisplay">
              <i class="bi bi-bell-slash me-2" id="alarmaIcon"></i>
              <span id="alarmaStatusText">Inactiva</span>
            </div>
            <span class="badge bg-secondary bg-opacity-25 px-3 py-2 rounded-pill" id="ultimaAccion">
              <i class="bi bi-clock me-1"></i> Esperando...
            </span>
          </div>

          <!-- BOTONES -->
          <div class="d-flex flex-wrap gap-3 mb-4">
            <button class="btn btn-alarma btn-activar flex-fill" id="btnActivar">
              <i class="bi bi-bell-fill me-2"></i> 🚨 HACER SONAR ALARMA
            </button>
            <button class="btn btn-alarma btn-desactivar flex-fill" id="btnDesactivar">
              <i class="bi bi-bell-slash-fill me-2"></i> ⏹️ DETENER ALARMA
            </button>
          </div>

          <!-- LOG DE ACTIVIDAD -->
          <div class="mt-2">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="text-uppercase small opacity-50 fw-bold mb-0">
                <i class="bi bi-activity me-1"></i> Actividad reciente
              </h6>
              <button class="btn-limpiar" id="clearLogsBtn">
                <i class="bi bi-eraser me-1"></i> Limpiar
              </button>
            </div>
            <ul class="list-group list-group-flush" id="logList">
              <li class="list-group-item d-flex justify-content-between align-items-center">
                <span><i class="bi bi-info-circle me-2"></i> Conectando al servidor...</span>
                <span class="badge badge-dispositivo rounded-pill">sistema</span>
              </li>
            </ul>
          </div>

          <!-- FOOTER -->
          <div class="footer-info d-flex justify-content-between flex-wrap mt-4">
            <span><i class="bi bi-wifi me-1"></i> WebSocket <span class="opacity-50">· Comunidad</span></span>
            <span><i class="bi bi-clock-history me-1"></i> <span id="timestampDisplay">--:--:--</span></span>
          </div>

        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ============================================================ -->
  <!-- LÓGICA PRINCIPAL (WebSocket + Sonido + UI)                    -->
  <!-- ============================================================ -->
  <script>
    (function() {
      'use strict';

      // ---------- ELEMENTOS DOM ----------
      const statusLed = document.getElementById('statusLed');
      const statusText = document.getElementById('statusText');
      const alarmaIcon = document.getElementById('alarmaIcon');
      const alarmaStatusText = document.getElementById('alarmaStatusText');
      const alarmaStatusDisplay = document.getElementById('alarmaStatusDisplay');
      const deviceCounter = document.getElementById('deviceCounter');
      const myDeviceId = document.getElementById('myDeviceId');
      const logList = document.getElementById('logList');
      const btnActivar = document.getElementById('btnActivar');
      const btnDesactivar = document.getElementById('btnDesactivar');
      const clearLogsBtn = document.getElementById('clearLogsBtn');
      const timestampDisplay = document.getElementById('timestampDisplay');
      const ultimaAccion = document.getElementById('ultimaAccion');
      const toastBody = document.getElementById('toastBody');
      const toastTime = document.getElementById('toastTime');

      // ---------- ESTADO ----------
      let alarmaActiva = false;
      let miId = 'Vecino-' + Math.floor(Math.random() * 10000);
      let socket = null;
      let reconnectTimer = null;
      let toastInstance = null;

      // Inicializar Toast
      const toastElement = document.getElementById('liveToast');
      if (toastElement) {
        toastInstance = new bootstrap.Toast(toastElement, { autohide: true, delay: 4000 });
      }

      // ---------- FUNCIONES DE SONIDO ----------
      function reproducirSonidoAlarma(duracion = 3000) {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc1 = audioCtx.createOscillator();
          const osc2 = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          gain.gain.value = 0.3;
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duracion / 1000);

          osc1.type = 'square';
          osc1.frequency.value = 880;
          osc2.type = 'square';
          osc2.frequency.value = 660;

          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(audioCtx.destination);

          osc1.start();
          osc2.start();
          osc1.stop(audioCtx.currentTime + duracion / 1000);
          osc2.stop(audioCtx.currentTime + duracion / 1000);
        } catch (e) {
          console.warn('Sonido no disponible:', e);
        }
      }

      function reproducirSonidoOff() {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          gain.gain.value = 0.2;
          osc.type = 'sine';
          osc.frequency.value = 520;
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.25);
        } catch (e) {}
      }

      // ---------- FUNCIONES UI ----------
      function actualizarUI() {
        if (alarmaActiva) {
          alarmaIcon.className = 'bi bi-bell-fill me-2 text-danger icono-pulso';
          alarmaStatusText.textContent = '🔔 ALARMA SONANDO';
          alarmaStatusText.style.color = '#f03a47';
          alarmaStatusDisplay.classList.add('activa');
          btnActivar.disabled = true;
          btnDesactivar.disabled = false;
        } else {
          alarmaIcon.className = 'bi bi-bell-slash me-2';
          alarmaStatusText.textContent = 'Inactiva';
          alarmaStatusText.style.color = '#a0c4e8';
          alarmaStatusDisplay.classList.remove('activa');
          btnActivar.disabled = false;
          btnDesactivar.disabled = true;
        }
      }

      function agregarLog(mensaje, tipo = 'info', dispositivo = null) {
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center';
        const prefix = dispositivo ? `<i class="bi bi-phone me-1"></i> <strong>${dispositivo}</strong>: ` : '';
        const badgeClass = tipo === 'alarma' ? 'badge-alarma' : 'badge-dispositivo';
        const badgeText = tipo === 'alarma' ? '🔊 ALARMA' : 'evento';
        li.innerHTML = `
          <span>${prefix}${mensaje}</span>
          <span class="badge rounded-pill ${badgeClass}">${badgeText}</span>
        `;
        logList.prepend(li);
        while (logList.children.length > 30) {
          logList.removeChild(logList.lastChild);
        }
      }

      function mostrarToast(mensaje) {
        toastBody.textContent = mensaje;
        toastTime.textContent = new Date().toLocaleTimeString();
        if (toastInstance) {
          toastInstance.show();
        }
      }

      function actualizarTimestamp() {
        const now = new Date();
        timestampDisplay.textContent = now.toLocaleTimeString('es-ES', { hour12: false });
      }
      setInterval(actualizarTimestamp, 1000);
      actualizarTimestamp();

      function actualizarUltimaAccion(texto) {
        ultimaAccion.innerHTML = `<i class="bi bi-clock me-1"></i> ${texto}`;
      }

      // ---------- WEBSOCKET ----------
      function conectarWebSocket() {
        // Detectar si estamos en local o en producción
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host;
        const wsUrl = `${protocol}//${host}`;

        console.log('🔄 Conectando a:', wsUrl);

        try {
          socket = new WebSocket(wsUrl);
        } catch (e) {
          console.error('Error al crear WebSocket:', e);
          reconectar();
          return;
        }

        socket.onopen = function() {
          console.log('✅ Conectado al servidor');
          statusLed.className = 'bi bi-circle-fill text-success me-1';
          statusText.textContent = 'Conectado';
          myDeviceId.textContent = miId;
          agregarLog('🟢 Conectado al servidor', 'info');
          actualizarUltimaAccion('Conectado');
          if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
          }
        };

        socket.onmessage = function(event) {
          try {
            const data = JSON.parse(event.data);
            console.log('📨 Recibido:', data);

            if (data.type === 'UPDATE_DEVICES') {
              deviceCounter.textContent = data.count;
              return;
            }

            if (data.type === 'ALARMA_ACTIVADA') {
              if (!alarmaActiva) {
                alarmaActiva = true;
                actualizarUI();
                reproducirSonidoAlarma(3500);
                agregarLog(`🚨 ALARMA ACTIVADA por ${data.from}`, 'alarma', data.from);
                actualizarUltimaAccion(`Activada por ${data.from}`);
                mostrarToast(`🔔 ¡ALARMA! Activada por ${data.from}`);
              } else {
                // Refuerzo
                reproducirSonidoAlarma(1500);
                agregarLog(`🔔 Refuerzo desde ${data.from}`, 'alarma', data.from);
              }
              return;
            }

            if (data.type === 'ALARMA_DESACTIVADA') {
              if (alarmaActiva) {
                alarmaActiva = false;
                actualizarUI();
                reproducirSonidoOff();
                agregarLog(`⏹️ Desactivada por ${data.from}`, 'info', data.from);
                actualizarUltimaAccion(`Desactivada por ${data.from}`);
                mostrarToast(`⏹️ Alarma detenida por ${data.from}`);
              } else {
                agregarLog(`⏹️ Intento de desactivar (ya inactiva) desde ${data.from}`, 'info', data.from);
              }
              return;
            }

            // Mensaje genérico
            if (data.from) {
              agregarLog(`📨 ${data.type || 'evento'} desde ${data.from}`, 'info', data.from);
            }
          } catch (e) {
            console.error('Error al procesar mensaje:', e);
          }
        };

        socket.onclose = function() {
          console.log('❌ Desconectado del servidor');
          statusLed.className = 'bi bi-circle-fill text-danger me-1';
          statusText.textContent = 'Desconectado';
          agregarLog('🔴 Desconectado del servidor', 'info');
          actualizarUltimaAccion('Desconectado');
          reconectar();
        };

        socket.onerror = function(error) {
          console.error('Error en WebSocket:', error);
          statusLed.className = 'bi bi-circle-fill text-warning me-1';
          statusText.textContent = 'Error';
        };
      }

      function reconectar() {
        if (reconnectTimer) return;
        statusText.textContent = 'Reconectando...';
        statusLed.className = 'bi bi-circle-fill text-warning me-1';
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          conectarWebSocket();
        }, 3000);
      }

      // ---------- ENVIAR MENSAJES ----------
      function enviarMensaje(tipo) {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({
            type: tipo,
            from: miId,
            timestamp: Date.now()
          }));
          return true;
        } else {
          agregarLog('⚠️ No se pudo enviar: sin conexión', 'info');
          mostrarToast('⚠️ Sin conexión al servidor');
          return false;
        }
      }

      // ---------- EVENTOS DE BOTONES ----------
      btnActivar.addEventListener('click', function() {
        if (alarmaActiva) {
          reproducirSonidoAlarma(1500);
          agregarLog('🔔 Alarma ya activa (refuerzo local)', 'alarma', miId);
          return;
        }
        if (enviarMensaje('ALARMA_ACTIVADA')) {
          alarmaActiva = true;
          actualizarUI();
          reproducirSonidoAlarma(3500);
          agregarLog('🚨 TÚ activaste la alarma', 'alarma', miId);
          actualizarUltimaAccion('Activada por ti');
          mostrarToast('🔔 ¡Activaste la alarma comunitaria!');
        }
      });

      btnDesactivar.addEventListener('click', function() {
        if (!alarmaActiva) {
          reproducirSonidoOff();
          agregarLog('⏹️ Alarma ya inactiva', 'info', miId);
          return;
        }
        if (enviarMensaje('ALARMA_DESACTIVADA')) {
          alarmaActiva = false;
          actualizarUI();
          reproducirSonidoOff();
          agregarLog('⏹️ TÚ desactivaste la alarma', 'info', miId);
          actualizarUltimaAccion('Desactivada por ti');
          mostrarToast('⏹️ Desactivaste la alarma');
        }
      });

      clearLogsBtn.addEventListener('click', function() {
        logList.innerHTML = '';
        agregarLog('🧹 Registro limpiado', 'info');
      });

      // ---------- INICIALIZAR ----------
      conectarWebSocket();
      actualizarUI();
      agregarLog(`🚀 ${miId} conectándose...`, 'info');
      myDeviceId.textContent = miId;

      // ---------- RECUPERAR CONEXIÓN AL VOLVER A LA PESTAÑA ----------
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && (!socket || socket.readyState !== WebSocket.OPEN)) {
          console.log('📱 Pestaña activa, reconectando...');
          if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
          }
          conectarWebSocket();
        }
      });

    })();
  </script>

</body>
</html>
